name: Fetch Telegram Jobs & Ingest

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; else pip install requests beautifulsoup4; fi

      - name: Run Telegram Scraper
        run: |
          python backend/fetch_telegram.py

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Sync to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -f schema.sql ]; then
            cd cloudflare && npx wrangler d1 execute lfrii_jobs_db --remote --file=../schema.sql
          elif [ -f extracted_jobs.json ]; then
            echo "Fichier json détecté"
          else
            echo "Aucun fichier à synchroniser"
          fi
