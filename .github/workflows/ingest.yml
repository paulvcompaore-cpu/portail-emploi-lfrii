name: Fetch Telegram Jobs & Ingest

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; else pip install requests beautifulsoup4; fi

      - name: Run Telegram Scraper
        run: |
          python backend/fetch_telegram.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Sync to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -f extracted_jobs.json ]; then
            python3 -c "
          import json, subprocess
          with open('extracted_jobs.json', 'r', encoding='utf-8') as f:
              jobs = json.load(f)
          for job in jobs:
              title = job.get('title', '').replace(\"'\", \"''\")
              company = job.get('company', '').replace(\"'\", \"''\")
              desc = job.get('description', '').replace(\"'\", \"''\")
              sql = f\"INSERT INTO jobs (id, title, company, pays, region, ville, contract_types, description, date_posted, date_expiry, source_url, status) VALUES ('{job['id']}', '{title}', '{company}', '{job['pays']}', '{job['region']}', '{job['ville']}', '{job['contract_types']}', '{desc}', '{job['date_posted']}', '{job['date_expiry']}', '{job['source_url']}', '{job['status']}') ON CONFLICT(id) DO UPDATE SET title=excluded.title, status=excluded.status;\"
              subprocess.run(['wrangler', 'd1', 'execute', 'lfrii_jobs_db', '--remote', '--command', sql], cwd='cloudflare', check=True)
          print(f'✅ {len(jobs)} offres synchronisées !')
          "
          else
            echo "⚠️ Aucun fichier extracted_jobs.json généré."
          fi
