name: Ingestion Automatique Telegram LFRII

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests

      - name: Execution du Scraper Telegram
        run: |
          python ${GITHUB_WORKSPACE}/backend/fetch_telegram.py

      - name: Sync avec Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute lfrii_jobs_db --file="${GITHUB_WORKSPACE}/cloudflare/schema.sql"
